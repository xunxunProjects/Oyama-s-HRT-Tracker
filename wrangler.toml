name = "hrt-tracker"
main = "worker.ts"
compatibility_date = "2025-12-04"

[assets]
directory = "./dist"

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "hrt-tracker-prod"
database_id = "916011c6-3b95-4116-a10e-76af94496170"

[[r2_buckets]]
binding = "AVATAR_BUCKET"
bucket_name = "mahiro-contents"

# Environment Variables
# Note: JWT_SECRET must be set as a Cloudflare Workers secret, NOT in this file
# Use: wrangler secret put JWT_SECRET
# Or configure via Cloudflare Dashboard: Workers & Pages > Your Worker > Settings > Variables and Secrets
# Generate a strong secret: openssl rand -base64 48
# See SECURITY.md for more details
